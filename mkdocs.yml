site_name: Hiroba — 7KGroup Docs
site_description: Documentation for Hiroba, the 7KGroup platform engineering framework built on Crossplane v2 and CDK8s.
site_url: https://docs.7kgroup.io/hiroba/
docs_dir: docs
repo_url: https://github.com/7K-Hiroba/Hiroba

theme:
  name: material
  logo: assets/icon.svg
  favicon: assets/icon.svg
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Guides:
      - usage-guide.md
      - developer-guide.md
      - architecture.md
  - Decisions (ADRs):
      - adr/001-why-crossplane.md
      - adr/002-why-cdk8s.md
      - adr/003-secret-management-strategy.md
      - adr/004-claims-vs-xrs.md
      - adr/005-feature-toggle-pattern.md
      - adr/006-multi-provider-compositions.md
      - adr/007-orchestrator-function.md
      - adr/008-stack-composition-in-orchestrator.md
      - adr/009-contract-codegen.md
      - adr/010-kro-managed-stacks.md
  - Runbooks:
      - runbooks/adding-a-new-provider.md
      - runbooks/debugging-stuck-xr.md
      - runbooks/manual-resource-cleanup.md
      - runbooks/migrating-stacks-to-kro.md
      - runbooks/onboarding-observability-agent.md
      - runbooks/rotating-provider-credentials.md
      - runbooks/upgrading-composition.md
  - 7KGroup ↗: https://7kgroup.org

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

extra:
  generator: false
