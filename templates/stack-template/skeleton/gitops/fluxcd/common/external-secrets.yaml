# External Secrets Operator — sync secrets from external stores.
# Remove this file if no app in the stack uses ExternalSecret resources.
# Docs: https://external-secrets.io/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
    app.kubernetes.io/component: common
spec:
  interval: 10m
  targetNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: "0.12.*"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  install:
    createNamespace: true
  values:
    installCRDs: true
