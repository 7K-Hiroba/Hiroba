# CloudNativePG — PostgreSQL operator.
# Remove this file if no app in the stack needs a managed PostgreSQL database.
# Docs: https://cloudnative-pg.io/documentation/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
    app.kubernetes.io/component: common
spec:
  interval: 10m
  targetNamespace: cnpg-system
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.23.*"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
  install:
    createNamespace: true
  values:
    crds:
      create: true
