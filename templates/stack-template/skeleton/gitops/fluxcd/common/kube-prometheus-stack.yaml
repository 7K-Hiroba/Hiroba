# kube-prometheus-stack — Prometheus, Grafana, Alertmanager.
# Remove this file if no app in the stack uses ServiceMonitor, PrometheusRules,
# or Grafana dashboards.
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
    app.kubernetes.io/component: common
spec:
  interval: 10m
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "67.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  install:
    createNamespace: true
  values:
    crds:
      enabled: true
    grafana:
      sidecar:
        dashboards:
          enabled: true
