# cert-manager — TLS certificate management.
# Remove this file if your stack does not need TLS automation.
# Docs: https://cert-manager.io/docs/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
    app.kubernetes.io/component: common
spec:
  interval: 10m
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "1.17.*"
      sourceRef:
        kind: HelmRepository
        name: jetstack
  install:
    createNamespace: true
  values:
    crds:
      enabled: true
