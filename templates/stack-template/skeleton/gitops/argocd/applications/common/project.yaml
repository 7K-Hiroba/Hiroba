# ArgoCD AppProject for operators and common infrastructure.
#
# All operator Applications in this directory belong to this project.
# Extend sourceRepos and destinations as you add or remove operators.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: common
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: hiroba
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  description: Shared operators and infrastructure for the ${{ values.name }} stack
  sourceRepos:
    - "https://charts.jetstack.io"
    - "https://cloudnative-pg.github.io/charts"
    - "https://charts.external-secrets.io"
    - "https://prometheus-community.github.io/helm-charts"
  destinations:
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: cnpg-system
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
