# ArgoCD Application for an example app.
#
# This is a reference you can copy for each app you add to the stack.
# It uses multi-source to pull the app's Helm charts from the app repo
# with Helm values inlined via valuesObject.
#
# To add a new app:
#   1. Copy this file to <app-name>.yaml
#   2. Update metadata.name, repoURL, and the valuesObject blocks
#   3. Commit and push — ArgoCD syncs automatically via the root App-of-Apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.name }}-example
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: hiroba
    app.kubernetes.io/component: app
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ${{ values.name }}
  sources:
    # App base chart (Deployment, Service, HTTPRoute, etc.)
    # CHANGE_ME: Replace with the actual app repo URL
    - repoURL: https://github.com/7K-Hiroba/CHANGE_ME.git
      targetRevision: main
      path: helm/base
      helm:
        valuesObject:
          replicaCount: 1

          image:
            repository: ghcr.io/7k-hiroba/CHANGE_ME   # CHANGE_ME
            pullPolicy: IfNotPresent

          gateway:
            enabled: true
            hostnames:
              - example.example.com   # CHANGE_ME: set your actual hostname
            parentRefs:
              - name: default-gateway

          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi

    # App platform chart (database, storage, secrets, observability)
    # CHANGE_ME: Replace with the actual app repo URL
    - repoURL: https://github.com/7K-Hiroba/CHANGE_ME.git
      targetRevision: main
      path: helm/platform
      helm:
        valuesObject:
          global:
            appName: example   # CHANGE_ME

          postgres:
            enabled: false

          s3:
            enabled: false

          observability:
            serviceMonitor:
              enabled: false
            grafanaDashboard:
              enabled: false
            prometheusRules:
              enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: ${{ values.name }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
