name: Bootstrap Artifact Hub

on:
  workflow_dispatch:

permissions:
      contents: write
      pull-requests: write

jobs:
  bootstrap:
    uses: 7K-Okura/workflows-library/.github/workflows/bootstrap-artifacthub.yml@v1
    with:
      org: 7k-okura
      registry-base: harbor.7kgroup.org/7kokura/charts
      charts: |
        [
          { "file": "helm/base-artifacthub-repo.yml",
            "chart": "${{ values.name }}",
            "displayName": "${{ values.displayName }}" },
          { "file": "helm/platform-artifacthub-repo.yml",
            "chart": "${{ values.name }}-platform",
            "displayName": "${{ values.displayName }} — Platform" }
        ]
    secrets: inherit
