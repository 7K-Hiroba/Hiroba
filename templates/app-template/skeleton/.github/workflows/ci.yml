name: CI

on:
  pull_request:
    branches: [main]  

permissions:
  pull-requests: write

jobs:
  lint-pr-title:
    if: >-
      !startsWith(github.head_ref, 'release-please--')
    uses: 7K-Hiroba/workflows-library/.github/workflows/ci-lint-pr-title.yml@main

  app:
    if: >-
      !startsWith(github.head_ref, 'release-please--') && (
      github.event_name == 'pull_request' ||
      contains(toJSON(github.event.commits.*.modified), 'Dockerfile'))
    uses: 7K-Hiroba/workflows-library/.github/workflows/ci.yml@v1
    with:
      stack: app
      image-name: ${{ values.name }}
      path: .
    secrets: inherit

  helm-base:
    if: >-
      !startsWith(github.head_ref, 'release-please--') && (
      github.event_name == 'pull_request' ||
      contains(toJSON(github.event.commits.*.modified), 'helm/base/'))
    uses: 7K-Hiroba/workflows-library/.github/workflows/ci.yml@v1
    with:
      stack: helm
      path: helm/base
    secrets: inherit

  helm-platform:
    if: >-
      !startsWith(github.head_ref, 'release-please--') && (
      github.event_name == 'pull_request' ||
      contains(toJSON(github.event.commits.*.modified), 'helm/platform/'))
    uses: 7K-Hiroba/workflows-library/.github/workflows/ci.yml@v1
    with:
      stack: helm
      path: helm/platform
    secrets: inherit

  docs:
    if: >-
      !startsWith(github.head_ref, 'release-please--') && (
      github.event_name == 'pull_request' ||
      contains(toJSON(github.event.commits.*.modified), 'docs/'))
    uses: 7K-Hiroba/workflows-library/.github/workflows/ci.yml@v1
    with:
      stack: docs
      path: docs
    secrets: inherit

  crossplane:
    if: >-
      !startsWith(github.head_ref, 'release-please--') && (
      github.event_name == 'pull_request' ||
      contains(toJSON(github.event.commits.*.modified), 'crossplane/'))
    uses: 7K-Hiroba/workflows-library/.github/workflows/ci.yml@v1
    with:
      stack: crossplane
      path: crossplane
    secrets: inherit
