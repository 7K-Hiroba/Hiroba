suite: Operator dependency checks
templates:
  - templates/checks.yaml
tests:
  - it: fails when postgres cnpg is enabled without CNPG CRD
    set:
      postgres.enabled: true
      postgres.provider: cnpg
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "postgres.enabled is true but the CloudNativePG Operator CRD (postgresql.cnpg.io/v1) is not installed. Install the operator first or set postgres.enabled=false."

  - it: fails when postgres aws is enabled without RDS CRD
    set:
      postgres.enabled: true
      postgres.provider: aws
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "postgres.enabled is true with provider 'aws' but the Crossplane RDS CRD (rds.aws.crossplane.io/v1alpha1) is not installed. Install Crossplane with the AWS provider first, or set postgres.enabled=false."

  - it: fails when postgres gcp is enabled without CloudSQL CRD
    set:
      postgres.enabled: true
      postgres.provider: gcp
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "postgres.enabled is true with provider 'gcp' but the Crossplane CloudSQL CRD (database.gcp.crossplane.io/v1beta1) is not installed. Install Crossplane with the GCP provider first, or set postgres.enabled=false."

  - it: fails when s3 aws is enabled without Crossplane S3 CRD
    set:
      s3.enabled: true
      s3.provider: aws
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "s3.enabled is true with provider 'aws' but the Crossplane S3 CRD (s3.aws.crossplane.io/v1beta1) is not installed. Install Crossplane with the AWS provider first, or set s3.enabled=false."

  - it: fails when s3 gcp is enabled without GCS CRD
    set:
      s3.enabled: true
      s3.provider: gcp
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "s3.enabled is true with provider 'gcp' but the Crossplane GCP Storage CRD (storage.gcp.crossplane.io/v1alpha3) is not installed. Install Crossplane with the GCP provider first, or set s3.enabled=false."

  - it: fails when externalSecrets is enabled without ESO CRD
    set:
      externalSecrets.enabled: true
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.enabled is true but the External Secrets Operator CRD (external-secrets.io/v1) is not installed. Install the operator first or set externalSecrets.enabled=false."

  - it: fails when ServiceMonitor is enabled without Prometheus Operator CRD
    set:
      observability.serviceMonitor.enabled: true
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "observability.serviceMonitor.enabled is true but the Prometheus Operator CRD (monitoring.coreos.com/v1) is not installed. Install the Prometheus Operator first or set observability.serviceMonitor.enabled=false."

  - it: fails when PrometheusRule is enabled without Prometheus Operator CRD
    set:
      observability.prometheusRules.enabled: true
    capabilities:
      apiVersions: []
    asserts:
      - failedTemplate:
          errorMessage: "observability.prometheusRules.enabled is true but the Prometheus Operator CRD (monitoring.coreos.com/v1) is not installed. Install the Prometheus Operator first or set observability.prometheusRules.enabled=false."

  - it: passes when all features disabled
    set:
      postgres.enabled: false
      s3.enabled: false
      externalSecrets.enabled: false
      observability.serviceMonitor.enabled: false
      observability.prometheusRules.enabled: false
    capabilities:
      apiVersions: []
    asserts:
      - hasDocuments:
          count: 0
