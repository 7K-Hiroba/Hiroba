suite: S3 Crossplane
templates:
  - templates/storage/s3-crossplane.yaml
capabilities:
  apiVersions:
    - s3.aws.crossplane.io/v1beta1
tests:
  - it: is not created when s3 is disabled
    set:
      s3.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: is not created when no buckets use crossplane provider
    set:
      s3.enabled: true
      s3.buckets:
        - name: assets
          provider: garage
          garage:
            clusterRef: my-cluster
    asserts:
      - hasDocuments:
          count: 0

  - it: renders Bucket for crossplane buckets
    set:
      s3.enabled: true
      s3.buckets:
        - name: assets
          provider: crossplane
          acl: private
          crossplane:
            region: us-east-1
            providerConfigRef: aws-provider
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Bucket
      - equal:
          path: apiVersion
          value: s3.aws.crossplane.io/v1beta1

  - it: Bucket uses configured name region and acl
    set:
      s3.enabled: true
      s3.buckets:
        - name: assets
          provider: crossplane
          acl: public-read
          crossplane:
            region: eu-west-1
            providerConfigRef: my-provider
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-assets
      - equal:
          path: spec.forProvider.region
          value: eu-west-1
      - equal:
          path: spec.forProvider.acl
          value: public-read
      - equal:
          path: spec.providerConfigRef.name
          value: my-provider

  - it: includes lifecycle configuration when enabled
    set:
      s3.enabled: true
      s3.buckets:
        - name: logs
          provider: crossplane
          acl: private
          crossplane:
            region: us-east-1
            providerConfigRef: aws-provider
            lifecycle:
              enabled: true
              expirationDays: 90
    asserts:
      - equal:
          path: spec.forProvider.lifecycleConfiguration.rules[0].status
          value: Enabled
      - equal:
          path: spec.forProvider.lifecycleConfiguration.rules[0].expiration.days
          value: 90

  - it: omits lifecycle configuration when disabled
    set:
      s3.enabled: true
      s3.buckets:
        - name: assets
          provider: crossplane
          acl: private
          crossplane:
            region: us-east-1
            providerConfigRef: aws-provider
            lifecycle:
              enabled: false
              expirationDays: 90
    asserts:
      - isNull:
          path: spec.forProvider.lifecycleConfiguration

  - it: applies standard labels
    set:
      s3.enabled: true
      s3.buckets:
        - name: assets
          provider: crossplane
          acl: private
          crossplane:
            region: us-east-1
            providerConfigRef: aws-provider
    asserts:
      - isNotNull:
          path: metadata.labels

  - it: renders multiple crossplane buckets
    set:
      s3.enabled: true
      s3.buckets:
        - name: assets
          provider: crossplane
          acl: private
          crossplane:
            region: us-east-1
            providerConfigRef: aws-provider
        - name: backups
          provider: crossplane
          acl: private
          crossplane:
            region: eu-west-1
            providerConfigRef: aws-provider
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-assets
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-backups
        documentIndex: 1

  - it: renders mixed providers only crossplane buckets
    set:
      s3.enabled: true
      s3.buckets:
        - name: assets
          provider: crossplane
          acl: private
          crossplane:
            region: us-east-1
            providerConfigRef: aws-provider
        - name: uploads
          provider: garage
          garage:
            clusterRef: my-cluster
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-assets
