suite: GCP CloudSQL PostgreSQL
templates:
  - templates/database/postgres-gcp.yaml
capabilities:
  apiVersions:
    - database.gcp.crossplane.io/v1beta1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when gcp provider is enabled
    set:
      postgres:
        enabled: true
        provider: gcp
        gcp:
          region: us-central1
          providerConfigRef: gcp-provider
          databaseVersion: POSTGRES_13
          tier: db-custom-1-3840
          writeConnectionSecretToRef:
            name: cloudsql-conn
            namespace: default
    asserts:
      - isKind:
          of: CloudSQLInstance
      - equal:
          path: apiVersion
          value: database.gcp.crossplane.io/v1beta1
      - equal:
          path: spec.forProvider.databaseVersion
          value: POSTGRES_13
      - equal:
          path: spec.forProvider.settings.tier
          value: db-custom-1-3840
      - equal:
          path: spec.providerConfigRef.name
          value: gcp-provider
