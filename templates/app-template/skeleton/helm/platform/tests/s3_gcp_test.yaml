suite: GCP Cloud Storage Bucket
templates:
  - templates/storage/s3-gcp.yaml
capabilities:
  apiVersions:
    - storage.gcp.crossplane.io/v1alpha3
tests:
  - it: is not created when s3 is disabled
    set:
      s3.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when gcp provider is enabled
    set:
      s3:
        enabled: true
        provider: gcp
        bucketName: assets
        gcp:
          location: US
          storageClass: STANDARD
          providerConfigRef: gcp-provider
    asserts:
      - isKind:
          of: Bucket
      - equal:
          path: apiVersion
          value: storage.gcp.crossplane.io/v1alpha3
      - equal:
          path: spec.location
          value: US
      - equal:
          path: spec.storageClass
          value: STANDARD
      - equal:
          path: spec.providerConfigRef.name
          value: gcp-provider
