suite: AWS RDS PostgreSQL
templates:
  - templates/database/postgres-aws.yaml
capabilities:
  apiVersions:
    - rds.aws.crossplane.io/v1alpha1
tests:
  - it: is not created when postgres is disabled
    set:
      postgres.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when aws provider is enabled
    set:
      postgres:
        enabled: true
        provider: aws
        aws:
          region: us-east-1
          providerConfigRef: aws-provider
          instanceClass: db.t3.micro
          allocatedStorage: 20
          engine: postgres
          engineVersion: "15.5"
          masterUsername: app
          masterUserPasswordSecretRef:
            name: rds-master
            namespace: default
            key: password
          writeConnectionSecretToRef:
            name: rds-conn
            namespace: default
    asserts:
      - isKind:
          of: DBInstance
      - equal:
          path: apiVersion
          value: rds.aws.crossplane.io/v1alpha1
      - equal:
          path: spec.forProvider.engine
          value: postgres
      - equal:
          path: spec.forProvider.dbInstanceClass
          value: db.t3.micro
      - equal:
          path: spec.forProvider.allocatedStorage
          value: 20
      - equal:
          path: spec.providerConfigRef.name
          value: aws-provider
