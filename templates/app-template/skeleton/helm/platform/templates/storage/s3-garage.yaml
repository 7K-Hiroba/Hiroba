{{- if and .Values.s3.enabled (eq .Values.s3.provider "garage") }}
{{- $bucketName := printf "%s-%s" (include "platform.name" .) .Values.s3.bucketName -}}
{{- $secretName := default (printf "%s-s3-credentials" (include "platform.name" .)) .Values.s3.garage.secretName -}}
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: {{ $bucketName }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  clusterRef:
    name: {{ .Values.s3.garage.clusterRef.name | quote }}
    {{- with .Values.s3.garage.clusterRef.namespace }}
    namespace: {{ . | quote }}
    {{- end }}
  {{- with .Values.s3.garage.quotas }}
  {{- if or .maxSize .maxObjects }}
  quotas:
    {{- if .maxSize }}
    maxSize: {{ .maxSize | quote }}
    {{- end }}
    {{- if .maxObjects }}
    maxObjects: {{ .maxObjects }}
    {{- end }}
  {{- end }}
  {{- end }}
  {{- if .Values.s3.garage.lifecycle.enabled }}
  lifecycle:
    rules:
      - id: default-expiration
        status: Enabled
        expirationDays: {{ .Values.s3.garage.lifecycle.expirationDays }}
  {{- end }}
  keyPermissions:
    - keyRef:
        name: {{ $bucketName }}
      read: {{ .Values.s3.garage.permissions.read }}
      write: {{ .Values.s3.garage.permissions.write }}
      owner: {{ .Values.s3.garage.permissions.owner }}
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: {{ $bucketName }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  clusterRef:
    name: {{ .Values.s3.garage.clusterRef.name | quote }}
    {{- with .Values.s3.garage.clusterRef.namespace }}
    namespace: {{ . | quote }}
    {{- end }}
  name: {{ include "platform.name" . | quote }}
  secretTemplate:
    name: {{ $secretName }}
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    endpointKey: S3_ENDPOINT
    regionKey: AWS_REGION
    includeEndpoint: true
    includeRegion: true
    additionalData:
      S3_BUCKET: {{ $bucketName | quote }}
  bucketPermissions:
    - bucketRef:
        name: {{ $bucketName }}
      read: {{ .Values.s3.garage.permissions.read }}
      write: {{ .Values.s3.garage.permissions.write }}
      owner: {{ .Values.s3.garage.permissions.owner }}
{{- end }}
