# Default values for ${{ values.name }}

# -- Number of pod replicas. Ignored when `autoscaling.enabled` is true.
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/7k-hiroba/${{ values.name }}
  # -- Image pull policy. One of: Always, IfNotPresent, Never
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to `.Chart.AppVersion` when unset.
  tag: ""

# -- Secrets used to pull from private registries
imagePullSecrets: []
# -- Override the chart name used in resource names
nameOverride: ""
# -- Fully override the generated fullname used in resource names
fullnameOverride: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount for the workload
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- Name to use. If unset and `create: true`, a name is generated from fullname.
  name: ""

# -- Annotations applied to every pod
podAnnotations: {}

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type. One of: ClusterIP, NodePort, LoadBalancer
  type: ClusterIP
  # -- Service port exposed inside the cluster
  port: 80
  # -- Container port the service targets (named `http`)
  targetPort: 8080

gateway:
  # -- Render the Gateway API `HTTPRoute` resource
  enabled: true
  # -- Annotations applied to the HTTPRoute
  annotations: {}
  # -- Parent Gateway references
  parentRefs:
    - name: default-gateway
      # namespace: gateway-system
      # sectionName: https
  # -- Hostnames to match
  hostnames:
    - myapp.example.com
  # -- Routing rules (omit for a simple catch-all route to the service)
  rules: []
  #  - matches:
  #      - path:
  #          type: PathPrefix
  #          value: /api
  #    filters:
  #      - type: RequestHeaderModifier
  #        requestHeaderModifier:
  #          add:
  #            - name: X-Forwarded-Prefix
  #              value: /api

# -- Pod resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Liveness probe (passed straight to the container spec)
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

# -- Readiness probe (passed straight to the container spec)
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  # -- Render a HorizontalPodAutoscaler. When true, `replicaCount` is ignored.
  enabled: false
  # -- Minimum replicas the HPA may scale to
  minReplicas: 1
  # -- Maximum replicas the HPA may scale to
  maxReplicas: 10
  # -- Target average CPU utilization across replicas
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget. Only meaningful when running more than one replica
# (replicaCount > 1 or autoscaling.enabled).
podDisruptionBudget:
  enabled: false
  # -- Exactly one of minAvailable or maxUnavailable should be set
  minAvailable: 1
  # maxUnavailable: 1

# -- nodeSelector applied to the workload pods
nodeSelector: {}
# -- tolerations applied to the workload pods
tolerations: []
# -- affinity applied to the workload pods
affinity: {}
# -- Extra environment variables, passed directly to the container
env: []
# -- Extra volumes added to the pod spec
extraVolumes: []
# -- Extra volume mounts added to the workload container
extraVolumeMounts: []
