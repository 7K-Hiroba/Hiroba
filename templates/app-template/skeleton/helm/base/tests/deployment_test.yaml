suite: Deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: uses the correct image
    set:
      image.repository: ghcr.io/example/app
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/app:1.2.3"

  - it: falls back to appVersion when tag is empty
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":0\\.1\\.0$"

  - it: omits replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: applies pod security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000

  - it: applies container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: sets resource limits and requests
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests

  - it: sets container port from service.targetPort
    set:
      service.targetPort: 3000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000

  - it: renders env vars when set
    set:
      env:
        - name: FOO
          value: bar
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: bar

  - it: renders extra volumes and mounts
    set:
      extraVolumes:
        - name: tmp
          emptyDir: {}
      extraVolumeMounts:
        - name: tmp
          mountPath: /tmp
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp

  - it: renders pod annotations
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations.prometheus\\.io/scrape
          value: "true"

  - it: mounts config volume when config is enabled
    set:
      config.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-0
            configMap:
              name: RELEASE-NAME-APP-app-config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-0
            mountPath: /app/app-config.yaml
            subPath: app-config.yaml
            readOnly: true

  - it: does not render config when disabled
    set:
      config.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: config-0
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts

  - it: uses custom configMapName when set
    set:
      config.enabled: true
      config.configs:
        - configMapName: my-custom-config
          mountPath: /app/app-config.yaml
          subPath: app-config.yaml
          readOnly: true
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: my-custom-config

  - it: mounts multiple config volumes
    set:
      config.enabled: true
      config.configs:
        - configMapName: config-a
          mountPath: /app/config-a.yaml
          subPath: config-a.yaml
          readOnly: true
        - configMapName: config-b
          mountPath: /app/config-b.yaml
          subPath: config-b.yaml
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-0
            configMap:
              name: config-a
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-1
            configMap:
              name: config-b
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-0
            mountPath: /app/config-a.yaml
            subPath: config-a.yaml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-1
            mountPath: /app/config-b.yaml
            subPath: config-b.yaml
            readOnly: true

  - it: renders top-level args when set
    set:
      args:
        - "custom-cmd"
        - "--flag"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "custom-cmd"
            - "--flag"

  - it: renders args independently of config
    set:
      args:
        - "node"
        - "server.js"
      config.enabled: true
      config.configs:
        - configMapName: my-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "node"
            - "server.js"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-0
            configMap:
              name: my-config

  - it: does not render args when empty
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].args
