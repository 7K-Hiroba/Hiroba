# Baseline values for the ${{ values.name }} base chart.
#
# This file is referenced by ArgoCD (gitops/argocd/application.yaml) and
# FluxCD (gitops/fluxcd/helmrelease-base.yaml) as the default value overlay
# applied on top of helm/base/values.yaml.
#
# Override any value from helm/base/values.yaml here. When deploying through a
# stack repo, copy this file to apps/${{ values.name }}/values-base.yaml in the
# stack and point the multi-source Application at that path instead.

replicaCount: 1

image:
  repository: ghcr.io/7k-hiroba/${{ values.name }}
  pullPolicy: IfNotPresent
  # tag: ""   # Leave empty to use appVersion from Chart.yaml; pin here for stability

gateway:
  enabled: true
  hostnames:
    - ${{ values.name }}.example.com   # CHANGE_ME: set your actual hostname
  parentRefs:
    - name: default-gateway
      # namespace: gateway-system
      # sectionName: https

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# env:
#   - name: UPSTREAM_URL
#     value: "http://another-service:8080"
#   - name: LOG_LEVEL
#     value: info
