apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${{ values.name }}
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
spec:
  interval: 10m
  targetNamespace: ${{ values.name }}
  sourceRef:
    kind: GitRepository
    name: ${{ values.name }}
  path: ./helm/base
  prune: true
  wait: true
  timeout: 5m
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ${{ values.name }}
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/7KGroup/${{ values.name }}.git
  ref:
    branch: main
