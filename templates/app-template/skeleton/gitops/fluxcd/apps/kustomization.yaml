# FluxCD Kustomization for ${{ values.name }} apps.
#
# Reconciles the apps/ directory containing Namespace, ConfigMap,
# and HelmReleases for base and platform charts.
#
# Usage:
#   kubectl apply -f gitops/fluxcd/apps/kustomization.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${{ values.name }}-apps
  namespace: flux-system
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/part-of: hiroba
spec:
  interval: 10m
  path: ./gitops/fluxcd/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: ${{ values.name }}
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: ${{ values.name }}-base
      namespace: flux-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: ${{ values.name }}-platform
      namespace: flux-system
  timeout: 5m
