# ArgoCD Application for the ${{ values.name }} base chart.
#
# Deploys the application workload with production-ready defaults:
# - HA with autoscaling and PDB
# - Security contexts (non-root, read-only root fs)
# - Health probes
# - Resource limits
#
# Usage:
#   kubectl apply -f gitops/argocd/applications/apps/base.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.name }}-base
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/component: base
    app.kubernetes.io/part-of: hiroba
spec:
  project: ${{ values.name }}
  source:
    repoURL: https://github.com/7K-Hiroba/${{ values.name }}.git
    targetRevision: HEAD
    path: helm/base
    helm:
      valuesObject:
        replicaCount: 2
        image:
          repository: ghcr.io/7k-hiroba/${{ values.name }}
          pullPolicy: IfNotPresent
          tag: ""
        serviceAccount:
          create: true
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 1000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        service:
          type: ClusterIP
          port: 80
          targetPort: 3333
        gateway:
          enabled: true
          parentRefs:
            - name: default-gateway
          hostnames:
            - ${{ values.name }}.example.com
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 5
          targetCPUUtilizationPercentage: 80
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        envFrom:
          - configMapRef:
              name: ${{ values.name }}-config
          - secretRef:
              name: ${{ values.name }}
        extraVolumes:
          - name: tmp
            emptyDir: {}
        extraVolumeMounts:
          - name: tmp
            mountPath: /tmp
  destination:
    server: https://kubernetes.default.svc
    namespace: ${{ values.name }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
