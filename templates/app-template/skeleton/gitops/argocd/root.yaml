# ArgoCD root Application (app-of-apps) for ${{ values.name }}.
#
# This Application points to the gitops/argocd/applications directory and
# recursively syncs all Applications within it. Apply this once to bootstrap
# the entire GitOps tree.
#
# Usage:
#   kubectl apply -f gitops/argocd/root.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.name }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/part-of: hiroba
spec:
  project: default
  source:
    repoURL: https://github.com/7K-Hiroba/${{ values.name }}.git
    targetRevision: HEAD
    path: gitops/argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
