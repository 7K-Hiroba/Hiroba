apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: app-template
  title: Hiroba Application Template
  description: Scaffold a new hiroba Kubernetes application with Helm charts, Dockerfile, TechDocs, and CI/CD
  tags:
    - kubernetes
    - helm
    - recommended
  annotations:
    backstage.io/docs-url: https://hiroba.7kgroup.org
spec:
  owner: group:hiroba
  type: service

  parameters:
    - title: Application Info
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Name
          type: string
          description: Unique name of the application
          ui:autofocus: true
          ui:options:
            rows: 1
        description:
          title: Description
          type: string
          description: What does this application do?
        owner:
          title: Owner
          type: string
          description: Team that owns this application
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

    - title: Platform Chart Examples
      description: >-
        The platform chart ships with example resource definitions.
        Toggle the ones you want included in your new app — you can always
        add or remove them later. See helm/platform/ for the full list.
      properties:
        enablePostgres:
          title: Include PostgreSQL example (CNPG)
          type: boolean
          default: false
          description: Include an example CloudNativePG PostgreSQL cluster definition
          ui:widget: checkbox
        enableS3:
          title: Include S3 Bucket example
          type: boolean
          default: false
          description: Include an example S3-compatible object storage bucket definition (Crossplane)
          ui:widget: checkbox

    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - 7K-Hiroba

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          enablePlatform: ${{ parameters.enablePlatform }}
          enablePostgres: ${{ parameters.enablePostgres }}
          enableS3: ${{ parameters.enableS3 }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
        topics:
          - hiroba
          - hiroba-app

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
