apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-platform-aggregate
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: 'true'
rules:
  # Agnostic primitives (Crossplane v2 namespaced XRs) Crossplane must be able to compose.
  - apiGroups: ['platform.7kgroup.org']
    resources:
      - 'postgresinstances'
      - 'objectbuckets'
    verbs: ['*']
  # Legacy observability products (until migrated to the primitives above).
  - apiGroups: ['platform.7kgroup.org']
    resources:
      - 'grafanainstances'
      - 'lokiinstances'
      - 'prometheusinstances'
    verbs: ['*']
