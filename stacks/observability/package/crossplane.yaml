apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: observability-stack-platform
  annotations:
    meta.crossplane.io/maintainer: platform-team@yourcompany.com
    meta.crossplane.io/source: github.com/yourcompany/platform-engineering
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Composite observability stack with Grafana, Loki, and Prometheus.
spec:
  crossplane:
    version: ">=v2.0.0"
  dependsOn:
    - configuration: xpkg.upbound.io/yourcompany/platform/grafana-platform
      version: ">=v1.0.0"
    - configuration: xpkg.upbound.io/yourcompany/platform/loki-platform
      version: ">=v1.0.0"
    - configuration: xpkg.upbound.io/yourcompany/platform/prometheus-platform
      version: ">=v1.0.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.2.0"
