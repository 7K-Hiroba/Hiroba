apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: grafana-platform
  annotations:
    meta.crossplane.io/maintainer: platform-team@yourcompany.com
    meta.crossplane.io/source: github.com/yourcompany/platform-engineering
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Self-service Grafana instances with profile-driven defaults,
      SSO integration, and automated TLS.
    meta.crossplane.io/readme: |
      # Grafana Platform Product
      Provides namespace-scoped GrafanaInstance Claims for development teams.
spec:
  crossplane:
    version: ">=v2.0.0"
  dependsOn:
    - provider: xpkg.upbound.io/upbound/provider-aws-rds
      version: ">=v1.0.0"
    - provider: xpkg.upbound.io/upbound/provider-aws-iam
      version: ">=v1.0.0"
    - function: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.2.0"
