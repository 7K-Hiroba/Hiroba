name: Debug secrets (temporary)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Report Harbor secret presence (lengths only)
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_ROBOT_NAME: ${{ secrets.HARBOR_ROBOT_NAME }}
          HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for v in HARBOR_REGISTRY HARBOR_PROJECT HARBOR_ROBOT_NAME HARBOR_ROBOT_TOKEN NPM_TOKEN; do
            val="${!v}"
            if [ -z "$val" ]; then
              echo "$v: EMPTY"
            else
              echo "$v: SET (length ${#val})"
            fi
          done
