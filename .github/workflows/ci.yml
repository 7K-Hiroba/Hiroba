name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  id-token: write

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

jobs:
  detect:
    # Skip release-please PRs: they only bump versions/changelogs, and with
    # separate-pull-requests there is one per package — a full CI run on each
    # is pure waste. Skipped jobs satisfy required-check branch protection.
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cdk8s: ${{ steps.filter.outputs.cdk8s }}
      function: ${{ steps.filter.outputs.function }}
      primitives: ${{ steps.filter.outputs.primitives }}
      stacks: ${{ steps.filter.outputs.stacks }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cdk8s:
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.github/workflows/ci.yml'
            function:
              - 'functions/platform/**'
            primitives:
              - 'packages/postgres/**'
              - 'packages/object-storage/**'
              - 'packages/primitives/**'
            stacks:
              - 'stacks/**'
              - 'scripts/validate-stacks.sh'
              - 'scripts/e2e-observability-stacks.sh'
              - '.github/workflows/ci.yml'

  pr-title:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    uses: 7K-Group/workflows-library/.github/workflows/ci-lint-pr-title.yml@v1
    secrets: inherit

  cdk8s:
    needs: detect
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.cdk8s == 'true' }}
    uses: 7K-Group/workflows-library/.github/workflows/ci-cdk8s.yml@v1
    with:
      path: .

  function:
    needs: detect
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.function == 'true' }}
    uses: 7K-Group/workflows-library/.github/workflows/ci-go-function.yml@v1
    with:
      path: functions/platform

  # Build (no push) the function runtime image so Dockerfile drift — e.g. a base
  # image Go version older than go.mod requires — fails on the PR, not at release.
  function-docker:
    needs: detect
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.function == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/build-push-action@v6
        with:
          context: functions/platform
          push: false
          load: true

  # Dry-run the full function release (runtime image + xpkg build with embedded
  # runtime, no push/sign/attest) so packaging drift — e.g. crossplane xpkg build
  # choking on a non-manifest YAML — fails on the PR, not at release.
  function-xpkg:
    needs: detect
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.function == 'true' }}
    uses: 7K-Group/workflows-library/.github/workflows/release-function.yml@v1
    with:
      path: functions/platform
      package-path: functions/platform/package
      version: 0.0.0-ci
      image-name: function-platform
      function-name: function-platform
      dry-run: true

  xpkg:
    needs: [detect, cdk8s]
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.primitives == 'true' }}
    uses: 7K-Group/workflows-library/.github/workflows/ci-crossplane.yml@v1
    with:
      path: packages/primitives
      prebuild: npm run build -w @7k-hiroba/shared && npm run synth -w @7k-hiroba/primitives

  validate-stacks:
    needs: detect
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.stacks == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: bash scripts/validate-stacks.sh

  e2e:
    needs: [detect, cdk8s, function]
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.cdk8s == 'true' || needs.detect.outputs.function == 'true' }}
    uses: 7K-Group/workflows-library/.github/workflows/ci-e2e-kind.yml@v1
    with:
      path: .
      setup-script: scripts/e2e-setup.sh

  e2e-observability-stacks:
    needs: [detect, validate-stacks]
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.stacks == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/setup-go@v5
        with:
          go-version-file: functions/platform/go.mod
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq openssl
          # Crossplane CLI (crank) used by e2e-setup.sh for xpkg build.
          curl -sL "https://releases.crossplane.io/stable/v2.3.3/bin/linux_amd64/crank" -o /tmp/crossplane
          chmod +x /tmp/crossplane
          sudo mv /tmp/crossplane /usr/local/bin/crossplane
      - name: Bootstrap kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: platform-e2e
      - name: Run platform e2e setup
        run: bash scripts/e2e-setup.sh platform-e2e
      - name: Run observability stacks e2e
        run: bash scripts/e2e-observability-stacks.sh platform-e2e

  # Integration gate: builds the primitives xpkg and installs it into kind. Promote to a
  # required check after the first successful run in CI.
  xpkg-e2e:
    needs: [detect, xpkg]
    if: ${{ github.event_name != 'pull_request' || needs.detect.outputs.primitives == 'true' }}
    uses: 7K-Group/workflows-library/.github/workflows/ci-crossplane-e2e.yml@v1
    with:
      path: packages/primitives
      image: platform-primitives
      prebuild: npm run build -w @7k-hiroba/shared && npm run synth -w @7k-hiroba/primitives
