name: CI

on:
  pull_request:
    branches: [main]

jobs:

  lint-helm:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.3 # helm

      - name: Lint library charts
        run: |
          for lib in helm/lib/*/; do
            if [ -f "$lib/Chart.yaml" ]; then
              echo "Linting $lib..."
              helm lint "$lib"
            fi
          done

      - name: Lint skeleton consumer charts (offline render)
        run: |
          # Skeleton charts depend on the library — wire them to the local
          # copy and render to catch include/value-surface drift.
          for skeleton in templates/*/skeleton; do
            if [ -d "$skeleton/helm" ]; then
              for chart in "$skeleton"/helm/*/; do
                if [ -f "$chart/Chart.yaml" ]; then
                  echo "Linting $chart..."
                  helm lint "$chart" || true
                fi
              done
            fi
          done

  lint-docs:
    name: Lint Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build docs site
        working-directory: website
        run: npm run build

  validate-templates:
    name: Validate Backstage Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate template YAML syntax
        run: |
          for template in templates/*/template.yaml; do
            if [ -f "$template" ]; then
              echo "Validating $template..."
              python3 -c "import yaml; yaml.safe_load(open('$template'))"
            fi
          done
