name: 'Release: Docs'

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs-release.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs
        run: pip install -r requirements-docs.txt

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 7

  publish:
    needs: build
    uses: 7K-Group/workflows-library/.github/workflows/release-docs.yml@v1
    with:
      path: site
      version: ${{ github.sha }}
      prefix: hiroba
      artifact: docs-site
    # Cross-org reusable workflow (7K-Group): secrets must be passed explicitly.
    secrets:
      DOCS_S3_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
      DOCS_S3_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
      APPDOCS_S3_BUCKET: ${{ secrets.APPDOCS_S3_BUCKET }}
      DOCS_S3_ENDPOINT_URL: ${{ secrets.DOCS_S3_ENDPOINT_URL }}
