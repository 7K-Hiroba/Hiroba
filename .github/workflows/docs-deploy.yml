name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install rclone
        run: curl -sSL https://rclone.org/install.sh | sudo bash

      - name: Sync app docs from S3
        env:
          RCLONE_CONFIG_APPDOCS_TYPE: s3
          RCLONE_CONFIG_APPDOCS_PROVIDER: Other
          RCLONE_CONFIG_APPDOCS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_APPDOCS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_APPDOCS_ENDPOINT: ${{ secrets.DOCS_S3_ENDPOINT_URL }}
        run: |
          for app in $(rclone lsf "appdocs:${{ secrets.APPDOCS_S3_BUCKET }}/" --dirs-only | tr -d '/'); do
            rclone sync "appdocs:${{ secrets.APPDOCS_S3_BUCKET }}/${app}/docs/" "docs/apps/${app}/"
          done

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Deploy to S3
        env:
          RCLONE_CONFIG_DOCS_TYPE: s3
          RCLONE_CONFIG_DOCS_PROVIDER: Other
          RCLONE_CONFIG_DOCS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_DOCS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_DOCS_ENDPOINT: ${{ secrets.DOCS_S3_ENDPOINT_URL }}
        run: rclone sync website/build/ "docs:${{ secrets.DOCS_S3_BUCKET }}/"
