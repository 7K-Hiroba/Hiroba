name: Deploy Docs

on:
  push:
    branches: [docs/setup-docusauros-centralized-documentation]
    #paths:
    #  - 'website/**'
    #  - 'docs/**'

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Set-up s5cmd
        uses: peak/action-setup-s5cmd@main
        with:
          version: v2.0.0
      


      - name: Sync app docs from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: garage
        run: |
          for app in $(s5cmd --endpoint-url=${{ secrets.DOCS_S3_ENDPOINT_URL }} ls "s3://${{ secrets.APPDOCS_S3_BUCKET }}/" | awk '{print $NF}' | sed 's|s3://${{ secrets.APPDOCS_S3_BUCKET }}/||' | tr -d '/'); do
            s5cmd --endpoint-url=${{ secrets.DOCS_S3_ENDPOINT_URL }} sync "s3://${{ secrets.APPDOCS_S3_BUCKET }}/${app}/docs/*" "docs/apps/${app}/"
          done

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Sync files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: garage
        run: | 
        
          s5cmd --endpoint-url=${{ secrets.DOCS_S3_ENDPOINT_URL }} sync --size-only --delete website/build/ s3://${{ secrets.DOCS_S3_BUCKET }}