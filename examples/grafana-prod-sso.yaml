apiVersion: platform.yourcompany.io/v1
kind: GrafanaInstanceClaim
metadata:
  name: prod-grafana
  namespace: team-api
  labels:
    team: team-api
    cost-center: cc-12345
    platform.yourcompany.io/stack: grafana
spec:
  profile: production
  provider: aws
  domain: grafana.prod.local
  features:
    sso:
      enabled: true
      secretRef:
        source: external-secrets
        store: platform-vault
        path: platform/sso/grafana
    alerting:
      enabled: true
    ingress:
      enabled: true
      config:
        tls: true
        ingressClass: nginx
