apiVersion: platform.7kgroup.org/v1
kind: ObservabilityStackClaim
metadata:
  name: team-api-observability
  namespace: team-api
  labels:
    team: team-api
    cost-center: cc-12345
    platform.7kgroup.org/stack: observability
spec:
  profile: production
  provider: aws
  domain: obs.team-api.example.com
  team: team-api
  costCenter: cc-12345
  modules:
    grafana:
      enabled: true
      features:
        sso:
          enabled: true
        alerting:
          enabled: true
    loki:
      enabled: true
      retentionDays: 90
    prometheus:
      enabled: true
      retentionDays: 90
      alerting:
        enabled: true
  globalFeatures:
    sso:
      enabled: true
    alerting:
      enabled: true
