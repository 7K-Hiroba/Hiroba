apiVersion: platform.yourcompany.io/v1
kind: ObservabilityStackClaim
metadata:
  name: team-api-observability
  namespace: team-api
  labels:
    team: team-api
    cost-center: cc-12345
    platform.yourcompany.io/stack: observability
spec:
  profile: production
  domain: obs.team-api.yourcompany.com
  team: team-api
  costCenter: cc-12345
  modules:
    grafana:
      enabled: true
      features:
        sso:
          enabled: true
        alerting:
          enabled: true
    loki:
      enabled: true
      storage: s3
      retentionDays: 90
    prometheus:
      enabled: true
      retentionDays: 90
      alerting:
        enabled: true
  globalFeatures:
    sso:
      enabled: true
    alerting:
      enabled: true
