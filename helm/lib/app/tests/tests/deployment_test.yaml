suite: Deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: mounts config volume when config is enabled
    set:
      config.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-0
            configMap:
              name: RELEASE-NAME-hiroba-app-lib-test-fixture-app-config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-0
            mountPath: /app/app-config.yaml
            subPath: app-config.yaml
            readOnly: true

  - it: does not render config when disabled
    set:
      config.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: config-0
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts

  - it: uses custom configMapName when set
    set:
      config.enabled: true
      config.configs:
        - configMapName: my-custom-config
          mountPath: /app/app-config.yaml
          subPath: app-config.yaml
          readOnly: true
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: my-custom-config

  - it: mounts multiple config volumes
    set:
      config.enabled: true
      config.configs:
        - configMapName: config-a
          mountPath: /app/config-a.yaml
          subPath: config-a.yaml
          readOnly: true
        - configMapName: config-b
          mountPath: /app/config-b.yaml
          subPath: config-b.yaml
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-0
            configMap:
              name: config-a
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-1
            configMap:
              name: config-b
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-0
            mountPath: /app/config-a.yaml
            subPath: config-a.yaml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-1
            mountPath: /app/config-b.yaml
            subPath: config-b.yaml
            readOnly: true

  - it: renders top-level args when set
    set:
      args:
        - "custom-cmd"
        - "--flag"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "custom-cmd"
            - "--flag"

  - it: renders args independently of config
    set:
      args:
        - "node"
        - "server.js"
      config.enabled: true
      config.configs:
        - configMapName: my-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "node"
            - "server.js"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-0
            configMap:
              name: my-config

  - it: does not render args when empty
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].args
