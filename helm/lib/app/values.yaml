# hiroba-app-lib is a *library* chart — Helm does NOT merge these values into
# the consumer chart's .Values. They are shipped only as a reference for the
# value surface every named template expects. Consumer charts copy / extend
# this in their own values.yaml.

# -- Number of pod replicas. Ignored when `autoscaling.enabled` is true.
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/example/app
  # -- Image pull policy. One of: Always, IfNotPresent, Never
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to `.Chart.AppVersion` when unset.
  tag: ""

# -- Secrets used to pull from private registries
imagePullSecrets: []
# -- Override the chart name used in resource names
nameOverride: ""
# -- Fully override the generated fullname used in resource names
fullnameOverride: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount for the workload
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. IRSA / Workload Identity)
  annotations: {}
  # -- Name to use. If unset and `create: true`, a name is generated from fullname.
  name: ""

# -- Annotations applied to every pod
podAnnotations: {}

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type. One of: ClusterIP, NodePort, LoadBalancer
  type: ClusterIP
  # -- Service port exposed inside the cluster
  port: 80
  # -- Container port the service targets (named `http`)
  targetPort: 8080

gateway:
  # -- Render the Gateway API `HTTPRoute` resource
  enabled: true
  # -- Annotations applied to the HTTPRoute
  annotations: {}
  # -- Parent Gateway references the HTTPRoute attaches to
  parentRefs:
    - name: default-gateway
  # -- Hostnames the route matches
  hostnames:
    - myapp.example.com
  # -- Routing rules. Leave empty for a catch-all forward to the service.
  rules: []

# -- Pod resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Liveness probe (passed straight to the container spec)
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

# -- Readiness probe (passed straight to the container spec)
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  # -- Render a HorizontalPodAutoscaler. When true, `replicaCount` is ignored.
  enabled: false
  # -- Minimum replicas the HPA may scale to
  minReplicas: 1
  # -- Maximum replicas the HPA may scale to
  maxReplicas: 10
  # -- Target average CPU utilization across replicas
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget. Only meaningful with replicaCount > 1 or HPA on.
podDisruptionBudget:
  # -- Render a PodDisruptionBudget
  enabled: false
  # -- Minimum available replicas. Mutually exclusive with `maxUnavailable`.
  minAvailable: 1

# -- nodeSelector applied to the workload pods
nodeSelector: {}
# -- tolerations applied to the workload pods
tolerations: []
# -- affinity applied to the workload pods
affinity: {}
# -- Container args override. When empty, the container uses the image's default CMD.
args: []

config:
  # -- Mount ConfigMap(s) into the container as files
  enabled: false
  # -- List of ConfigMaps to mount as files
  configs:
    # -- Name of the ConfigMap to mount. Defaults to fullname + "-app-config" when empty
    - configMapName: ""
      # -- File path where the config is mounted inside the container
      mountPath: "/app/app-config.yaml"
      # -- The key inside the ConfigMap to mount as a file (required for readOnlyRootFilesystem)
      subPath: "app-config.yaml"
      # -- Whether the mounted config file is read-only
      readOnly: true

# -- Extra environment variables, passed directly to the container
env: []
# -- envFrom sources (ConfigMapRef / SecretRef) injected into the container
envFrom: []
# -- Extra volumes added to the pod spec
extraVolumes: []
# -- Extra volume mounts added to the workload container
extraVolumeMounts: []
