# hiroba-app-lib is a *library* chart — Helm does NOT merge these values into
# the consumer chart's .Values. They are shipped only as a reference for the
# value surface every named template expects. Consumer charts copy / extend
# this in their own values.yaml.

# -- Number of pod replicas. Ignored when `autoscaling.enabled` is true.
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/example/app
  # -- Image pull policy. One of: Always, IfNotPresent, Never
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to `.Chart.AppVersion` when unset.
  tag: ""

# -- Secrets used to pull from private registries
imagePullSecrets: []
# -- Override the chart name used in resource names
nameOverride: ""
# -- Fully override the generated fullname used in resource names
fullnameOverride: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount for the workload
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. IRSA / Workload Identity)
  annotations: {}
  # -- Name to use. If unset and `create: true`, a name is generated from fullname.
  name: ""

# -- Annotations applied to every pod
podAnnotations: {}

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type. One of: ClusterIP, NodePort, LoadBalancer
  type: ClusterIP
  # -- Service port exposed inside the cluster
  port: 80
  # -- Container port the service targets (named `http`)
  targetPort: 8080

gateway:
  # -- Render the Gateway API `HTTPRoute` resource
  enabled: true
  # -- Annotations applied to the HTTPRoute
  annotations: {}
  # -- Parent Gateway references the HTTPRoute attaches to
  parentRefs:
    - name: default-gateway
  # -- Hostnames the route matches
  hostnames:
    - myapp.example.com
  # -- Filters prepended to every rule (e.g. response security headers).
  # Set to [] to opt out. CSP in particular needs per-deployment tuning.
  defaultFilters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
          - name: Strict-Transport-Security
            value: "max-age=63072000; includeSubDomains"
          - name: X-Content-Type-Options
            value: nosniff
          - name: X-Frame-Options
            value: DENY
          - name: Referrer-Policy
            value: strict-origin-when-cross-origin
  # -- Routing rules. Leave empty for a catch-all forward to the service.
  rules: []

# -- Pod resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Liveness probe (passed straight to the container spec)
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

# -- Readiness probe (passed straight to the container spec)
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

# -- Startup probe (passed straight to the container spec).
# When set, disables liveness and readiness checks until the container starts.
startupProbe: {}

autoscaling:
  # -- Render a HorizontalPodAutoscaler. When true, `replicaCount` is ignored.
  enabled: false
  # -- Minimum replicas the HPA may scale to
  minReplicas: 1
  # -- Maximum replicas the HPA may scale to
  maxReplicas: 10
  # -- Target average CPU utilization across replicas
  targetCPUUtilizationPercentage: 80
  # -- Workload kind to scale. One of: Deployment, StatefulSet
  scaleTargetKind: Deployment

# -- Pod Disruption Budget. Only meaningful with replicaCount > 1 or HPA on.
podDisruptionBudget:
  # -- Render a PodDisruptionBudget
  enabled: false
  # -- Minimum available replicas. Mutually exclusive with `maxUnavailable`.
  minAvailable: 1

# -- nodeSelector applied to the workload pods
nodeSelector: {}
# -- tolerations applied to the workload pods
tolerations: []
# -- affinity applied to the workload pods
affinity: {}
# -- Container args override. When empty, the container uses the image's default CMD.
args: []

# -- Init containers run before the main app container. They share the same pod
# volumes and are useful for filesystem initialization (e.g. setting permissions,
# seeding data, running migrations). Each init container is a standard Kubernetes
# container spec. Volume mounts from persistence.claims and config are NOT
# automatically injected — specify them explicitly if needed.
initContainers: []
# - name: init-filesystem
#   image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
#   command: ["/bin/sh", "-c"]
#   args:
#     - |
#       set -e
#       mkdir -p /var/www/html/sites/default/files
#       chmod 775 /var/www/html/sites/default/files
#   volumeMounts:
#     - name: persistence-sites
#       mountPath: /var/www/html/sites

statefulset:
  # -- Service name governing the StatefulSet. Defaults to the chart fullname.
  serviceName: ""
  # -- Pod management policy. One of: OrderedReady, Parallel
  podManagementPolicy: OrderedReady
  # -- StatefulSet update strategy
  updateStrategy:
    type: RollingUpdate
  # -- Volume claim templates for the StatefulSet
  volumeClaimTemplates: []

config:
  # -- Mount ConfigMap(s) into the container as files
  enabled: false
  # -- List of ConfigMaps to mount as files
  configs:
    # -- Name of the ConfigMap to mount. Defaults to fullname + "-app-config" when empty
    - configMapName: ""
      # -- File path where the config is mounted inside the container
      mountPath: "/app/app-config.yaml"
      # -- The key inside the ConfigMap to mount as a file (required for readOnlyRootFilesystem)
      subPath: "app-config.yaml"
      # -- Whether the mounted config file is read-only
      readOnly: true

# -- Persistent volume claims for application storage.
# Each entry creates a PVC and mounts it into the workload container.
persistence:
  claims: []
  # - name: files
  #   # -- Create the PVC (set false to use existingClaim only)
  #   enabled: true
  #   # -- Size of the PVC
  #   size: 5Gi
  #   # -- Access mode for the PVC
  #   accessMode: ReadWriteOnce
  #   # -- StorageClass for the PVC. Empty uses cluster default.
  #   storageClass: ""
  #   # -- Use an existing PVC instead of creating one
  #   existingClaim: ""
  #   # -- Mount path inside the container
  #   mountPath: /app/files

# -- Extra environment variables, passed directly to the container
env: []
# -- envFrom sources (ConfigMapRef / SecretRef) injected into the container
envFrom: []
# -- Extra volumes added to the pod spec
extraVolumes: []
# -- Extra volume mounts added to the workload container
extraVolumeMounts: []

# -- Extra raw Kubernetes resources to deploy. Each entry is a multi-line YAML
# string (use `|`). Templating is supported — use `{{ include "hiroba-app.name" . }}`,
# `{{ .Release.Name }}`, etc.
extraDeploy: []
# - |
#   apiVersion: v1
#   kind: ConfigMap
#   metadata:
#     name: {{ include "hiroba-app.fullname" . }}-extra
#   data:
#     key: value
